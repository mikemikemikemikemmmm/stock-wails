name: Cross-Platform Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    strategy:
      # 矩陣設定：同時跑三種作業系統
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output_name: windows
          - os: ubuntu-latest
            platform: linux/amd64
            output_name: linux
          - os: macos-latest
            platform: darwin/universal
            output_name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux 需要額外的依賴庫來編譯 WebKitGTK
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build App
        run: |
          wails build -platform ${{ matrix.platform }} -clean

      # 將編譯好的檔案移動到統一的分類資料夾（選用）
      - name: Prepare Artifact Path
        shell: bash
        run: |
          mkdir -p build/bin/${{ matrix.output_name }}
          # Windows 會產出 .exe，macOS 是 .app，Linux 是無副檔名二進位檔
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv build/bin/*.exe build/bin/${{ matrix.output_name }}/ || true
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv build/bin/*.app build/bin/${{ matrix.output_name }}/ || true
          else
            mv build/bin/* build/bin/${{ matrix.output_name }}/ || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-build-${{ matrix.output_name }}
          path: build/bin/${{ matrix.output_name }}/